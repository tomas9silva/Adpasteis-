<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AD Pastéis Stats</title>
<style>
body{margin:0;font-family:Arial;background:#071326;color:white}
.app{max-width:520px;margin:auto;padding:118px 10px 110px}
h1{font-size:20px;margin:0;background:#101b31;padding:12px;border-radius:14px}
.card{background:white;color:#111;border-radius:14px;padding:12px;margin:10px 0}
button,input,select{width:100%;padding:11px;margin-top:7px;font-size:15px;border-radius:10px;border:1px solid #ccc}
button{border:0;color:white;font-weight:bold}
.green{background:#26a626}.blue{background:#087dcc}.red{background:#e93421}.orange{background:#f28b12}.purple{background:#8b1bc4}.cyan{background:#0aa6ad}.pink{background:#d91b76}.dark{background:#101b31}.yellow{background:#ffd21a;color:#111}.danger{background:#d71920}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.players{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.playerBtn{background:#eef1f6;color:#111;border:1px solid #ccc;font-size:13px;padding:9px}
.playerBtn.active{background:#26a626;color:white}
.playerBtn.campo{border:2px solid #26a626}
.playerBtn.banco{border:2px solid #087dcc}
.hidden{display:none}
.stat,.log{background:#f1f3f6;padding:8px;border-radius:8px;margin:5px 0;font-size:13px}
.stat{display:flex;justify-content:space-between;gap:8px}
.playerCard{background:#101b31;color:white;border-radius:12px;padding:10px;margin-top:8px}
.small{font-size:12px;opacity:.9}
.topFloat{position:fixed;top:12px;left:0;right:0;max-width:520px;margin:auto;display:flex;justify-content:space-between;align-items:flex-start;padding:0 12px;z-index:999;pointer-events:none}
.floatBox{width:96px;height:96px;background:#101b31;color:#ffd21a;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 14px #0009;pointer-events:auto}
#cronometro{font-size:22px;font-weight:bold}
.timerBtns,.actionBtns{display:flex;gap:4px;margin-top:5px}
.timerBtns button,.actionBtns button{width:25px;height:25px;padding:0;margin:0;border-radius:50%;font-size:11px}
#acaoFloatText{text-align:center;font-size:12px;line-height:1.15;color:white;max-width:84px;min-height:35px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.subBig{font-size:17px;padding:14px;background:#101b31}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;display:none;align-items:center;justify-content:center;padding:12px}
.modalContent{background:white;color:#111;border-radius:18px;padding:14px;max-width:500px;width:100%;max-height:90vh;overflow:auto}
.modal.show{display:flex}
</style>
</head>
<body>
<div class="topFloat">
  <div class="floatBox">
    <div id="acaoFloatText">Sem<br>ação</div>
    <div class="actionBtns">
      <button class="green" onclick="confirmarAcao()">✓</button>
      <button class="danger" onclick="cancelarAcao()">×</button>
      <button class="orange" onclick="desfazerUltima()">↶</button>
    </div>
  </div>
  <div class="floatBox">
    <div id="cronometro">12:00</div>
    <div class="timerBtns">
      <button class="green" onclick="iniciarCronometro()">▶</button>
      <button class="orange" onclick="pausarCronometro()">Ⅱ</button>
      <button class="danger" onclick="reporCronometro()">↺</button>
    </div>
  </div>
</div>

<div class="app">
<h1>AD PASTÉIS</h1>
<div class="card">
  <label>Período</label>
  <select id="periodo">
    <option>1.º período</option>
    <option>2.º período</option>
    <option>3.º período</option>
  </select>
</div>
<div class="card">
  <h3>Jogador</h3>
  <div id="jogadoresGrid" class="players"></div>
  <div class="playerCard" id="cartaoJogador" onclick="toggleDetalhes()"></div>
</div>
<div class="card">
  <h3>Ações</h3>
  <div id="acoesGrid" class="grid"></div>
  <button class="subBig" onclick="abrirSubstituicao()">🔄 SUBSTITUIÇÃO</button>
</div>
<div class="card">
  <button class="dark" onclick="toggle('editar')">Editar jogadores</button>
  <div id="editar" class="hidden"></div>
</div>
<div class="card">
  <button class="dark" onclick="toggle('estatisticas')">Estatísticas completas</button>
  <div id="estatisticas" class="hidden"></div>
</div>
<div class="card">
  <button class="dark" onclick="toggle('historico')">Histórico</button>
  <div id="historico" class="hidden"></div>
  <button class="yellow" onclick="exportarCSV()">Exportar CSV</button>
  <button class="danger" onclick="limpar()">Limpar jogo</button>
</div>
</div>

<div id="modalSub" class="modal">
  <div class="modalContent">
    <h2>Substituição</h2>
    <h4>Em campo</h4>
    <div id="campoGrid" class="players"></div>
    <h4>Banco</h4>
    <div id="bancoGrid" class="players"></div>
    <div class="playerCard" id="subSelecionada">Seleciona quem sai e quem entra.</div>
    <button class="green" onclick="confirmarSub()">Confirmar substituição</button>
    <button class="danger" onclick="fecharSubstituicao()">Cancelar</button>
    <div id="historicoSubs"></div>
  </div>
</div>

<script>
let jogadores=JSON.parse(localStorage.getItem("jogadores_pasteis"))||[];
if(jogadores.length===0){for(let i=1;i<=12;i++)jogadores.push("Jogador "+i)}
let campo=JSON.parse(localStorage.getItem("campo_pasteis"))||jogadores.slice(0,5);
let banco=JSON.parse(localStorage.getItem("banco_pasteis"))||jogadores.slice(5);
let registos=JSON.parse(localStorage.getItem("registos_pasteis"))||[];
let substituicoes=JSON.parse(localStorage.getItem("subs_pasteis"))||[];
let jogadorAtivo=jogadores[0];
let acaoTemp=null;
let saiTemp=null;
let entraTemp=null;
let detalhesAbertos=false;
let tempo=12*60;
let intervalo=null;
const acoes=["Remate jogo corrido","Remate livre","Golo dentro da área","Golo fora da área","Golo de livre","Golo de cabeça","Golo de canto","Defesa"];

function tempoAtual(){let m=Math.floor(tempo/60),s=tempo%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}
function toggle(id){document.getElementById(id).classList.toggle("hidden")}
function contar(f){return registos.filter(f).length}
function golosJogador(j){return contar(r=>r.jogador===j&&r.acao.startsWith("Golo"))}

function renderJogadores(){
 let grid=document.getElementById("jogadoresGrid");grid.innerHTML="";
 jogadores.forEach(j=>{let b=document.createElement("button");b.className="playerBtn"+(j===jogadorAtivo?" active":"");b.textContent=j;b.onclick=()=>{jogadorAtivo=j;renderJogadores();atualizar()};grid.appendChild(b)})
}
function renderAcoes(){
 let grid=document.getElementById("acoesGrid");grid.innerHTML="";
 acoes.forEach((a,i)=>{let b=document.createElement("button");b.textContent=a;b.className=["green","blue","red","orange","purple","cyan","pink","dark"][i];b.onclick=()=>selecionarAcao(a);grid.appendChild(b)})
}
function toggleDetalhes(){detalhesAbertos=!detalhesAbertos;atualizar()}
function selecionarAcao(a){acaoTemp=a;atualizarAcaoFloat()}
function atualizarAcaoFloat(){
 let box=document.getElementById("acaoFloatText");
 if(!acaoTemp){box.innerHTML="Sem<br>ação"}else{box.innerHTML="<b>"+jogadorAtivo+"</b><span>"+acaoTemp+"</span>"}
}
function confirmarAcao(){
 if(!acaoTemp){alert("Seleciona primeiro uma ação.");return}
 registos.unshift({jogador:jogadorAtivo,periodo:document.getElementById("periodo").value,tempo:tempoAtual(),acao:acaoTemp,data:new Date().toLocaleString("pt-PT")});
 localStorage.setItem("registos_pasteis",JSON.stringify(registos));
 cancelarAcao();atualizar()
}
function cancelarAcao(){acaoTemp=null;atualizarAcaoFloat()}
function desfazerUltima(){
 if(registos.length===0){alert("Não há ações para desfazer.");return}
 registos.shift();localStorage.setItem("registos_pasteis",JSON.stringify(registos));atualizar()
}
function renderEditar(){
 let ed=document.getElementById("editar");ed.innerHTML="";
 jogadores.forEach((j,i)=>{ed.innerHTML+=`<input id="nome${i}" value="${j}">`});
 ed.innerHTML+=`<button class="green" onclick="guardarNomes()">Guardar nomes</button><button class="danger" onclick="reporNomes()">Repor Jogador 1-12</button>`
}
function guardarNomes(){
 let antigos=[...jogadores];
 jogadores=jogadores.map((j,i)=>document.getElementById("nome"+i).value||("Jogador "+(i+1)));
 registos.forEach(r=>{let idx=antigos.indexOf(r.jogador);if(idx>=0)r.jogador=jogadores[idx]});
 substituicoes.forEach(s=>{let idxS=antigos.indexOf(s.sai),idxE=antigos.indexOf(s.entra);if(idxS>=0)s.sai=jogadores[idxS];if(idxE>=0)s.entra=jogadores[idxE]});
 campo=campo.map(p=>{let idx=antigos.indexOf(p);return idx>=0?jogadores[idx]:p});
 banco=banco.map(p=>{let idx=antigos.indexOf(p);return idx>=0?jogadores[idx]:p});
 jogadorAtivo=jogadores[0];guardarTudo();renderEditar();renderJogadores();renderSubs();atualizar()
}
function reporNomes(){
 jogadores=[];for(let i=1;i<=12;i++)jogadores.push("Jogador "+i);
 campo=jogadores.slice(0,5);banco=jogadores.slice(5);jogadorAtivo=jogadores[0];
 guardarTudo();renderEditar();renderJogadores();renderSubs();atualizar()
}
function guardarTudo(){
 localStorage.setItem("jogadores_pasteis",JSON.stringify(jogadores));
 localStorage.setItem("campo_pasteis",JSON.stringify(campo));
 localStorage.setItem("banco_pasteis",JSON.stringify(banco));
 localStorage.setItem("registos_pasteis",JSON.stringify(registos));
 localStorage.setItem("subs_pasteis",JSON.stringify(substituicoes))
}
function abrirSubstituicao(){document.getElementById("modalSub").classList.add("show");renderSubs()}
function fecharSubstituicao(){saiTemp=null;entraTemp=null;document.getElementById("modalSub").classList.remove("show");renderSubs()}
function renderSubs(){
 let cg=document.getElementById("campoGrid"),bg=document.getElementById("bancoGrid");cg.innerHTML="";bg.innerHTML="";
 campo.forEach(j=>{let b=document.createElement("button");b.className="playerBtn campo"+(saiTemp===j?" active":"");b.textContent=j;b.onclick=()=>{saiTemp=j;renderSubs();mostrarSub()};cg.appendChild(b)});
 banco.forEach(j=>{let b=document.createElement("button");b.className="playerBtn banco"+(entraTemp===j?" active":"");b.textContent=j;b.onclick=()=>{entraTemp=j;renderSubs();mostrarSub()};bg.appendChild(b)});
 mostrarSub()
}
function mostrarSub(){document.getElementById("subSelecionada").innerHTML="Sai: <b>"+(saiTemp||"-")+"</b><br>Entra: <b>"+(entraTemp||"-")+"</b><br>"+tempoAtual()}
function confirmarSub(){
 if(!saiTemp||!entraTemp){alert("Seleciona quem sai e quem entra.");return}
 campo=campo.filter(j=>j!==saiTemp);banco=banco.filter(j=>j!==entraTemp);campo.push(entraTemp);banco.push(saiTemp);
 substituicoes.unshift({sai:saiTemp,entra:entraTemp,periodo:document.getElementById("periodo").value,tempo:tempoAtual(),data:new Date().toLocaleString("pt-PT")});
 saiTemp=null;entraTemp=null;guardarTudo();fecharSubstituicao();atualizar()
}
function atualizar(){
 let resumo=`<b>${jogadorAtivo} ${detalhesAbertos?"▲":"▼"}</b><br><span class="small">⚽ ${golosJogador(jogadorAtivo)} | 🎯 ${contar(r=>r.jogador===jogadorAtivo&&r.acao==="Remate jogo corrido")} | 🥅 ${contar(r=>r.jogador===jogadorAtivo&&r.acao==="Remate livre")} | 🧤 ${contar(r=>r.jogador===jogadorAtivo&&r.acao==="Defesa")}</span>`;
 if(detalhesAbertos){resumo+="<hr>";acoes.forEach(a=>{resumo+=`${a}: <b>${contar(r=>r.jogador===jogadorAtivo&&r.acao===a)}</b><br>`})}
 document.getElementById("cartaoJogador").innerHTML=resumo;
 let est=document.getElementById("estatisticas");est.innerHTML="";
 jogadores.forEach(p=>{est.innerHTML+=`<div class="stat"><b>${p}</b><span>⚽ ${golosJogador(p)} | 🎯 ${contar(r=>r.jogador===p&&r.acao==="Remate jogo corrido")} | 🥅 ${contar(r=>r.jogador===p&&r.acao==="Remate livre")} | 🧤 ${contar(r=>r.jogador===p&&r.acao==="Defesa")}</span></div>`;acoes.forEach(a=>{est.innerHTML+=`<div class="stat"><span>${a}</span><b>${contar(r=>r.jogador===p&&r.acao===a)}</b></div>`})});
 let hist=document.getElementById("historico");hist.innerHTML="";
 registos.slice(0,80).forEach(r=>{hist.innerHTML+=`<div class="log"><b>${r.acao}</b><br>${r.jogador} · ${r.periodo} · ${r.tempo}<br>${r.data}</div>`});
 let hs=document.getElementById("historicoSubs");hs.innerHTML="";
 substituicoes.slice(0,40).forEach(s=>{hs.innerHTML+=`<div class="log"><b>Substituição</b><br>Sai: ${s.sai}<br>Entra: ${s.entra}<br>${s.periodo} · ${s.tempo}</div>`});
 atualizarAcaoFloat()
}
function iniciarCronometro(){if(intervalo)return;intervalo=setInterval(()=>{if(tempo>0){tempo--;atualizarCronometro()}else{pausarCronometro();alert("Fim do período")}},1000)}
function pausarCronometro(){clearInterval(intervalo);intervalo=null}
function reporCronometro(){pausarCronometro();tempo=12*60;atualizarCronometro()}
function atualizarCronometro(){document.getElementById("cronometro").innerHTML=tempoAtual()}
function limpar(){if(confirm("Apagar todos os registos deste jogo?")){registos=[];substituicoes=[];localStorage.removeItem("registos_pasteis");localStorage.removeItem("subs_pasteis");atualizar()}}
function exportarCSV(){
 let csv="Tipo,Data,Periodo,Tempo,Jogador,Acao,Sai,Entra\n";
 registos.forEach(r=>csv+=`"Ação","${r.data}","${r.periodo}","${r.tempo}","${r.jogador}","${r.acao}","",""\n`);
 substituicoes.forEach(s=>csv+=`"Substituição","${s.data}","${s.periodo}","${s.tempo}","","","${s.sai}","${s.entra}"\n`);
 let blob=new Blob([csv],{type:"text/csv;charset=utf-8"});let url=URL.createObjectURL(blob);let a=document.createElement("a");a.href=url;a.download="estatisticas_ad_pasteis.csv";a.click();URL.revokeObjectURL(url)
}
renderJogadores();renderAcoes();renderEditar();renderSubs();atualizarCronometro();atualizar();
</script>
</body>
</html>
