<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AD Pastéis Stats</title>
<style>
body{margin:0;font-family:Arial;background:#071326;color:white}
.app{max-width:520px;margin:auto;padding:10px}
.top{display:flex;justify-content:space-between;align-items:center;background:#101b31;padding:10px;border-radius:14px;margin-bottom:10px}
h1{font-size:20px;margin:0;color:white}
#cronometro{font-size:28px;font-weight:bold;color:#ffd21a}
.card{background:white;color:#111;border-radius:14px;padding:12px;margin-bottom:10px}
.row{display:flex;gap:8px}
button,select,input{width:100%;padding:12px;margin-top:7px;font-size:16px;border-radius:10px;border:1px solid #ccc}
button{border:0;color:white;font-weight:bold}
.green{background:#26a626}.blue{background:#087dcc}.red{background:#e93421}.orange{background:#f28b12}.purple{background:#8b1bc4}.cyan{background:#0aa6ad}.pink{background:#d91b76}.yellow{background:#ffd21a;color:#111}.dark{background:#101b31}.danger{background:#d71920}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat{display:flex;justify-content:space-between;background:#f1f3f6;padding:8px;border-radius:8px;margin:5px 0}
.small{font-size:13px}
.hidden{display:none}
.playerCard{background:#101b31;color:white;border-radius:12px;padding:10px;margin-top:8px}
.log{background:#f1f3f6;padding:8px;border-radius:8px;margin:5px 0;font-size:13px}
</style>
</head>
<body>
<div class="app">

<div class="top">
  <h1>AD PASTÉIS</h1>
  <div id="cronometro">12:00</div>
</div>

<div class="card">
  <div class="row">
    <button class="green" onclick="iniciarCronometro()">Iniciar</button>
    <button class="orange" onclick="pausarCronometro()">Pausar</button>
    <button class="danger" onclick="reporCronometro()">Repor</button>
  </div>
</div>

<div class="card">
  <label>Período</label>
  <select id="periodo">
    <option>1.º período</option>
    <option>2.º período</option>
    <option>3.º período</option>
  </select>

  <label>Jogador</label>
  <select id="jogador" onchange="atualizar()"></select>

  <div class="playerCard" id="cartaoJogador"></div>
</div>

<div class="card">
  <h3>Ações</h3>
  <div class="grid">
    <button class="green" onclick="selecionarAcao('Remate jogo corrido')">Remate jogo corrido</button>
    <button class="blue" onclick="selecionarAcao('Remate livre')">Remate livre</button>
    <button class="red" onclick="selecionarAcao('Golo dentro da área')">Golo dentro da área</button>
    <button class="orange" onclick="selecionarAcao('Golo fora da área')">Golo fora da área</button>
    <button class="purple" onclick="selecionarAcao('Golo atrás do meio campo')">Golo atrás do meio campo</button>
    <button class="cyan" onclick="selecionarAcao('Golo de cabeça')">Golo de cabeça</button>
    <button class="pink" onclick="selecionarAcao('Golo de canto')">Golo de canto</button>
  </div>
</div>

<div class="card">
  <h3>Ação selecionada</h3>
  <div id="acaoSelecionada">Nenhuma ação selecionada</div>
  <button class="green" onclick="confirmarAcao()">Confirmar ação</button>
  <button class="orange" onclick="desfazerUltima()">Desfazer última ação</button>
</div>

<div class="card">
  <button class="dark" onclick="toggle('editar')">Editar jogadores</button>
  <div id="editar" class="hidden"></div>
</div>

<div class="card">
  <button class="dark" onclick="toggle('subs')">Substituições</button>
  <div id="subs" class="hidden">
    <label>Sai</label>
    <select id="sai"></select>
    <label>Entra</label>
    <select id="entra"></select>
    <button class="green" onclick="confirmarSub()">Confirmar substituição</button>
    <div id="historicoSubs"></div>
  </div>
</div>

<div class="card">
  <button class="dark" onclick="toggle('estatisticas')">Estatísticas completas</button>
  <div id="estatisticas" class="hidden"></div>
</div>

<div class="card">
  <button class="dark" onclick="toggle('historico')">Histórico</button>
  <div id="historico" class="hidden"></div>
  <button class="yellow" onclick="exportarCSV()">Exportar CSV</button>
  <button class="danger" onclick="limpar()">Limpar jogo</button>
</div>

</div>

<script>
let jogadores=JSON.parse(localStorage.getItem("jogadores_pasteis"))||[];
if(jogadores.length===0){for(let i=1;i<=12;i++)jogadores.push("Jogador "+i)}

let registos=JSON.parse(localStorage.getItem("registos_pasteis"))||[];
let substituicoes=JSON.parse(localStorage.getItem("subs_pasteis"))||[];
let acaoTemp=null;
let tempo=12*60;
let intervalo=null;

const acoes=[
"Remate jogo corrido","Remate livre","Golo dentro da área","Golo fora da área",
"Golo atrás do meio campo","Golo de cabeça","Golo de canto"
];

function tempoAtual(){
 let m=Math.floor(tempo/60),s=tempo%60;
 return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function carregarJogadores(){
 let selects=["jogador","sai","entra"];
 selects.forEach(id=>{
  let sel=document.getElementById(id);
  sel.innerHTML="";
  jogadores.forEach(j=>{
   let op=document.createElement("option");
   op.textContent=j;
   sel.appendChild(op);
  });
 });

 let ed=document.getElementById("editar");
 ed.innerHTML="";
 jogadores.forEach((j,i)=>{
  ed.innerHTML+=`<input id="nome${i}" value="${j}">`;
 });
 ed.innerHTML+=`<button class="green" onclick="guardarNomes()">Guardar nomes</button>
 <button class="danger" onclick="reporNomes()">Repor Jogador 1-12</button>`;
}

function guardarNomes(){
 jogadores=jogadores.map((j,i)=>document.getElementById("nome"+i).value||("Jogador "+(i+1)));
 localStorage.setItem("jogadores_pasteis",JSON.stringify(jogadores));
 carregarJogadores();atualizar();
}

function reporNomes(){
 jogadores=[];for(let i=1;i<=12;i++)jogadores.push("Jogador "+i);
 localStorage.setItem("jogadores_pasteis",JSON.stringify(jogadores));
 carregarJogadores();atualizar();
}

function contar(f){return registos.filter(f).length}

function selecionarAcao(a){
 acaoTemp=a;
 document.getElementById("acaoSelecionada").innerHTML=
 "<b>"+document.getElementById("jogador").value+"</b><br>"+a+"<br>"+
 document.getElementById("periodo").value+" · "+tempoAtual();
}

function confirmarAcao(){
 if(!acaoTemp){alert("Seleciona primeiro uma ação.");return}
 registos.unshift({
  jogador:document.getElementById("jogador").value,
  periodo:document.getElementById("periodo").value,
  tempo:tempoAtual(),
  acao:acaoTemp,
  data:new Date().toLocaleString("pt-PT")
 });
 localStorage.setItem("registos_pasteis",JSON.stringify(registos));
 acaoTemp=null;
 document.getElementById("acaoSelecionada").innerHTML="Nenhuma ação selecionada";
 atualizar();
}

function desfazerUltima(){
 if(registos.length===0){alert("Não há ações para desfazer.");return}
 registos.shift();
 localStorage.setItem("registos_pasteis",JSON.stringify(registos));
 atualizar();
}

function confirmarSub(){
 let s=document.getElementById("sai").value;
 let e=document.getElementById("entra").value;
 substituicoes.unshift({
  sai:s,entra:e,periodo:document.getElementById("periodo").value,
  tempo:tempoAtual(),data:new Date().toLocaleString("pt-PT")
 });
 localStorage.setItem("subs_pasteis",JSON.stringify(substituicoes));
 atualizar();
}

function atualizar(){
 let j=document.getElementById("jogador").value||jogadores[0];
 document.getElementById("cartaoJogador").innerHTML=
 `<b>${j}</b><br>
 ⚽ Golos: ${contar(r=>r.jogador===j && r.acao.startsWith("Golo"))}<br>
 🎯 Remates jogo corrido: ${contar(r=>r.jogador===j && r.acao==="Remate jogo corrido")}<br>
 🥅 Remates livres: ${contar(r=>r.jogador===j && r.acao==="Remate livre")}`;

 let est=document.getElementById("estatisticas");
 est.innerHTML="";
 jogadores.forEach(p=>{
  est.innerHTML+=`<div class="stat"><b>${p}</b><span>⚽ ${contar(r=>r.jogador===p && r.acao.startsWith("Golo"))} | 🎯 ${contar(r=>r.jogador===p && r.acao==="Remate jogo corrido")} | 🥅 ${contar(r=>r.jogador===p && r.acao==="Remate livre")}</span></div>`;
 });

 let hist=document.getElementById("historico");
 hist.innerHTML="";
 registos.slice(0,40).forEach(r=>{
  hist.innerHTML+=`<div class="log"><b>${r.acao}</b><br>${r.jogador} · ${r.periodo} · ${r.tempo}<br>${r.data}</div>`;
 });

 let hs=document.getElementById("historicoSubs");
 hs.innerHTML="";
 substituicoes.slice(0,20).forEach(s=>{
  hs.innerHTML+=`<div class="log"><b>Substituição</b><br>Sai: ${s.sai}<br>Entra: ${s.entra}<br>${s.periodo} · ${s.tempo}</div>`;
 });
}

function toggle(id){
 document.getElementById(id).classList.toggle("hidden");
}

function iniciarCronometro(){
 if(intervalo)return;
 intervalo=setInterval(()=>{
  if(tempo>0){tempo--;atualizarCronometro()}
  else{pausarCronometro();alert("Fim do período")}
 },1000);
}

function pausarCronometro(){clearInterval(intervalo);intervalo=null}

function reporCronometro(){pausarCronometro();tempo=12*60;atualizarCronometro()}

function atualizarCronometro(){
 document.getElementById("cronometro").innerHTML=tempoAtual();
}

function limpar(){
 if(confirm("Apagar todos os registos deste jogo?")){
  registos=[];substituicoes=[];
  localStorage.removeItem("registos_pasteis");
  localStorage.removeItem("subs_pasteis");
  atualizar();
 }
}

function exportarCSV(){
 let csv="Tipo,Data,Periodo,Tempo,Jogador,Acao,Sai,Entra\n";
 registos.forEach(r=>csv+=`"Ação","${r.data}","${r.periodo}","${r.tempo}","${r.jogador}","${r.acao}","",""\n`);
 substituicoes.forEach(s=>csv+=`"Substituição","${s.data}","${s.periodo}","${s.tempo}","","","${s.sai}","${s.entra}"\n`);
 let blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
 let url=URL.createObjectURL(blob);
 let a=document.createElement("a");
 a.href=url;a.download="estatisticas_ad_pasteis.csv";a.click();
 URL.revokeObjectURL(url);
}

carregarJogadores();
atualizarCronometro();
atualizar();
</script>
</body>
</html>
