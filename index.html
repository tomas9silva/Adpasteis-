<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>AD Pastéis Stats</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#071326;color:#fff;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 10%,rgba(34,91,171,.35),transparent 34%),linear-gradient(180deg,#0a1d3a,#071326 62%,#04101f);z-index:-2}
body::after{content:"AD PASTÉIS";position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-12deg);font-size:min(15vw,120px);font-weight:900;letter-spacing:8px;color:rgba(255,255,255,.045);z-index:-1;white-space:nowrap;pointer-events:none}
.app{width:100%;max-width:1120px;margin:0 auto;padding:8px 10px 12px;min-height:100dvh;display:flex;flex-direction:column;gap:8px}
.topbar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
h1{margin:0;font-size:18px;letter-spacing:.5px}.iconbtn,.btn{border:0;border-radius:12px;background:#143e78;color:#fff;font-weight:800;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.22)}.iconbtn{width:42px;height:38px;font-size:18px}.btn{padding:10px 12px;font-size:14px}.btn.danger{background:#8d1e2c}.btn.light{background:#fff;color:#0b1d38}.btn.ghost{background:rgba(255,255,255,.12)}
.score-clock{width:100%;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:stretch;background:rgba(255,255,255,.94);color:#071326;border-radius:18px;padding:8px;overflow:hidden;max-width:100%}
.score-area{min-width:0;display:grid;grid-template-columns:minmax(72px,1fr) auto minmax(72px,1fr);gap:6px;align-items:center}.team{text-align:center;min-width:0}.team-name{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score-controls{display:flex;justify-content:center;gap:4px;margin-top:5px}.mini{width:28px;height:26px;border:0;border-radius:8px;background:#0e3467;color:white;font-weight:900;font-size:16px}.score-number{font-size:34px;font-weight:900;line-height:1}.dash{font-size:26px;font-weight:900;color:#123}.score-mid{display:flex;align-items:center;gap:6px;justify-content:center;min-width:72px}.clock-area{display:flex;align-items:center;gap:6px;background:#071326;color:#fff;border-radius:14px;padding:6px 8px;white-space:nowrap}.time{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums}.clock-btn{width:30px;height:30px;border:0;border-radius:9px;background:#fff;color:#071326;font-weight:900}
.periods{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.periods button{padding:8px;border:0;border-radius:12px;background:rgba(255,255,255,.14);color:white;font-weight:800}.periods button.active{background:#fff;color:#071326}
.main-grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1.1fr;gap:8px}.panel{background:rgba(3,17,39,.82);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:8px;overflow:hidden;max-width:100%}.panel-title{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:#dce8ff}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:6px;max-height:calc(100dvh - 275px);overflow:auto;padding-right:2px}.player{min-height:44px;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:rgba(255,255,255,.1);color:white;font-weight:800;padding:5px;text-align:center}.player small{display:block;opacity:.75;font-size:10px;margin-top:2px}.player.active{background:#fff;color:#071326}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.action{min-height:48px;border:0;border-radius:14px;background:#1557a6;color:white;font-weight:900;font-size:12px;padding:6px}.action.selected{outline:3px solid #fff;background:#d99a18}.quickbar{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.history{margin-top:8px;max-height:105px;overflow:auto;font-size:12px;background:rgba(255,255,255,.08);border-radius:12px;padding:6px}.history div{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.settings,.modal{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:10;display:none;align-items:center;justify-content:center;padding:14px}.settings.show,.modal.show{display:flex}.sheet{width:min(560px,100%);max-height:92dvh;overflow:auto;background:#071326;border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.45)}.sheet h2{margin:0 0 12px;font-size:20px}.field{margin:10px 0}.field label{display:block;font-size:12px;font-weight:900;opacity:.86;margin-bottom:5px}.field input,.field select{width:100%;border:1px solid rgba(255,255,255,.2);border-radius:12px;background:#fff;color:#071326;padding:11px;font-size:16px}.stepper{display:grid;grid-template-columns:46px 1fr 46px;gap:8px;align-items:center}.stepper span{text-align:center;background:rgba(255,255,255,.1);border-radius:12px;padding:12px;font-size:20px;font-weight:900}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.modal-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}.modal-list button{min-height:42px;border:0;border-radius:12px;background:#fff;color:#071326;font-weight:900}
@media(max-width:760px){.app{padding:6px}.score-clock{grid-template-columns:1fr;padding:7px}.clock-area{justify-content:center}.time{font-size:22px}.score-number{font-size:30px}.main-grid{grid-template-columns:1fr}.players{max-height:145px}.actions{grid-template-columns:repeat(3,1fr)}.action{min-height:44px;font-size:11px}.history{max-height:75px}.panel{padding:7px}.topbar h1{font-size:16px}}
@media(max-height:720px){.players{max-height:116px}.action{min-height:40px}.history{max-height:56px}.btn{padding:8px}.periods button{padding:7px}.score-number{font-size:28px}.time{font-size:21px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><h1>AD PASTÉIS</h1><button class="iconbtn" onclick="openSettings()">⚙</button></div>

  <section class="score-clock">
    <div class="score-area">
      <div class="team"><div id="homeName" class="team-name">Equipa da casa</div><div class="score-controls"><button class="mini" onclick="changeGoal('home',-1)">−</button><button class="mini" onclick="changeGoal('home',1)">+</button></div></div>
      <div class="score-mid"><span id="homeScore" class="score-number">0</span><span class="dash">-</span><span id="awayScore" class="score-number">0</span></div>
      <div class="team"><div id="awayName" class="team-name">Equipa adversária</div><div class="score-controls"><button class="mini" onclick="changeGoal('away',-1)">−</button><button class="mini" onclick="changeGoal('away',1)">+</button></div></div>
    </div>
    <div class="clock-area"><button class="clock-btn" onclick="startClock()">▶</button><div id="time" class="time">12:00</div><button class="clock-btn" onclick="pauseClock()">Ⅱ</button><button class="clock-btn" onclick="resetClock()">↺</button></div>
  </section>

  <div class="periods"><button id="p1" onclick="setPeriod(1)">1.º período</button><button id="p2" onclick="setPeriod(2)">2.º período</button><button id="p3" onclick="setPeriod(3)">3.º período</button></div>

  <main class="main-grid">
    <section class="panel"><h3 class="panel-title">Jogador</h3><div id="players" class="players"></div></section>
    <section class="panel"><h3 class="panel-title">Ações</h3><div id="actions" class="actions"></div><div class="quickbar"><button class="btn ghost" onclick="openSubModal()">SUBSTITUIÇÃO</button><button class="btn ghost" onclick="undoLast()">↶ Anular</button><button class="btn light" onclick="exportCSV()">Exportar CSV</button><button class="btn danger" onclick="clearGame()">Limpar jogo</button></div><div id="history" class="history"></div></section>
  </main>
</div>

<div id="settings" class="settings">
  <div class="sheet">
    <h2>Definições</h2>
    <div class="field"><label>Equipa da casa</label><input id="setHome" type="text"></div>
    <div class="field"><label>Equipa adversária</label><input id="setAway" type="text"></div>
    <div class="field"><label>Jogo / observação</label><input id="setGame" type="text" placeholder="Ex.: vs adversário, torneio, local"></div>
    <div class="field"><label>Duração do período, em minutos</label><input id="setMinutes" type="number" min="1" max="60"></div>
    <div class="field"><label>Número de jogadores</label><div class="stepper"><button class="btn" onclick="stepPlayers(-1)">−</button><span id="setPlayersNumber">12</span><button class="btn" onclick="stepPlayers(1)">+</button></div></div>
    <div class="sheet-actions"><button class="btn light" onclick="saveSettings()">Guardar</button><button class="btn ghost" onclick="closeSettings()">Fechar</button></div>
  </div>
</div>

<div id="subModal" class="modal"><div class="sheet"><h2>Substituição</h2><p>Seleciona quem sai e quem entra.</p><div id="subList" class="modal-list"></div><div class="sheet-actions"><button class="btn light" onclick="confirmSub()">Confirmar</button><button class="btn ghost" onclick="closeSubModal()">Cancelar</button></div></div></div>

<script>
const DEFAULT_ACTIONS=['Golo','Remate','Remate enquadrado','Passe certo','Passe errado','Recuperação','Perda de bola','Falta feita','Falta sofrida','Canto','Defesa GR','Cartão'];
let state={home:'Equipa da casa',away:'Equipa adversária',game:'',periodMinutes:12,playersCount:12,homeGoals:0,awayGoals:0,period:1,selectedPlayer:null,seconds:720,running:false,events:[],players:[]};
let timer=null, subOut=null, subIn=null;
function load(){const saved=localStorage.getItem('adpasteis_state');if(saved){try{state={...state,...JSON.parse(saved)}}catch(e){}} if(!state.players||state.players.length!==state.playersCount){state.players=Array.from({length:state.playersCount},(_,i)=>state.players&&state.players[i]?state.players[i]:{name:'Jogador '+(i+1),number:i+1,on:i<5});} state.seconds=Number.isFinite(state.seconds)?state.seconds:state.periodMinutes*60; renderAll();}
function save(){localStorage.setItem('adpasteis_state',JSON.stringify(state));}
function renderAll(){document.getElementById('homeName').textContent=state.home;document.getElementById('awayName').textContent=state.away;document.getElementById('homeScore').textContent=state.homeGoals;document.getElementById('awayScore').textContent=state.awayGoals;document.getElementById('time').textContent=formatTime(state.seconds);[1,2,3].forEach(p=>document.getElementById('p'+p).classList.toggle('active',state.period===p));renderPlayers();renderActions();renderHistory();save();}
function formatTime(s){s=Math.max(0,s);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function startClock(){if(timer)return;state.running=true;timer=setInterval(()=>{if(state.seconds>0){state.seconds--;renderAll()}else pauseClock()},1000)}
function pauseClock(){state.running=false;clearInterval(timer);timer=null;save()}
function resetClock(){pauseClock();state.seconds=state.periodMinutes*60;renderAll()}
function setPeriod(p){state.period=p;state.seconds=state.periodMinutes*60;pauseClock();renderAll()}
function changeGoal(team,delta){if(team==='home')state.homeGoals=Math.max(0,state.homeGoals+delta);else state.awayGoals=Math.max(0,state.awayGoals+delta);addEvent('Resultado',team==='home'?state.home:state.away,delta>0?'+1 golo':'-1 golo');renderAll()}
function renderPlayers(){const el=document.getElementById('players');el.innerHTML='';state.players.forEach((p,i)=>{const b=document.createElement('button');b.className='player'+(state.selectedPlayer===i?' active':'');b.innerHTML='<b>'+p.number+'</b> '+escapeHTML(p.name)+'<small>'+(p.on?'Em campo':'Banco')+'</small>';b.onclick=()=>{state.selectedPlayer=i;renderAll()};el.appendChild(b)})}
function renderActions(){const el=document.getElementById('actions');el.innerHTML='';DEFAULT_ACTIONS.forEach(a=>{const b=document.createElement('button');b.className='action';b.textContent=a;b.onclick=()=>recordAction(a);el.appendChild(b)})}
function recordAction(action){if(state.selectedPlayer===null){alert('Seleciona primeiro um jogador.');return} const p=state.players[state.selectedPlayer];addEvent(action,p.name,'');renderAll()}
function addEvent(action,player,notes){state.events.unshift({time:new Date().toLocaleString('pt-PT'),gameTime:formatTime(state.seconds),period:state.period,player,action,notes,home:state.home,away:state.away,score:state.homeGoals+'-'+state.awayGoals,game:state.game});}
function renderHistory(){const el=document.getElementById('history');if(!state.events.length){el.innerHTML='<div>Sem ação</div>';return}el.innerHTML=state.events.slice(0,18).map(e=>'<div><b>'+escapeHTML(e.gameTime)+'</b> P'+e.period+' · '+escapeHTML(e.player)+' · '+escapeHTML(e.action)+'</div>').join('')}
function undoLast(){state.events.shift();renderAll()}
function clearGame(){if(!confirm('Limpar estatísticas deste jogo?'))return;pauseClock();state.homeGoals=0;state.awayGoals=0;state.period=1;state.seconds=state.periodMinutes*60;state.selectedPlayer=null;state.events=[];renderAll()}
function openSettings(){document.getElementById('setHome').value=state.home;document.getElementById('setAway').value=state.away;document.getElementById('setGame').value=state.game;document.getElementById('setMinutes').value=state.periodMinutes;document.getElementById('setPlayersNumber').textContent=state.playersCount;document.getElementById('settings').classList.add('show')}
function closeSettings(){document.getElementById('settings').classList.remove('show')}
function stepPlayers(d){state.playersCount=Math.min(30,Math.max(1,state.playersCount+d));document.getElementById('setPlayersNumber').textContent=state.playersCount}
function saveSettings(){state.home=document.getElementById('setHome').value.trim()||'Equipa da casa';state.away=document.getElementById('setAway').value.trim()||'Equipa adversária';state.game=document.getElementById('setGame').value.trim();state.periodMinutes=Math.max(1,Number(document.getElementById('setMinutes').value)||12);const old=state.players||[];state.players=Array.from({length:state.playersCount},(_,i)=>old[i]||{name:'Jogador '+(i+1),number:i+1,on:i<5});state.selectedPlayer=null;state.seconds=state.periodMinutes*60;closeSettings();renderAll()}
function openSubModal(){subOut=null;subIn=null;const el=document.getElementById('subList');el.innerHTML='';state.players.forEach((p,i)=>{const b=document.createElement('button');b.textContent=(p.on?'Sai: ':'Entra: ')+p.number+' '+p.name;b.onclick=()=>{if(p.on)subOut=i;else subIn=i;b.style.outline='3px solid #ffcc00'};el.appendChild(b)});document.getElementById('subModal').classList.add('show')}
function closeSubModal(){document.getElementById('subModal').classList.remove('show')}
function confirmSub(){if(subOut===null||subIn===null){alert('Escolhe um jogador em campo e um jogador do banco.');return}state.players[subOut].on=false;state.players[subIn].on=true;addEvent('Substituição',state.players[subOut].name+' → '+state.players[subIn].name,'');closeSubModal();renderAll()}
function exportCSV(){const rows=[['Data','Tempo','Período','Equipa casa','Equipa adversária','Resultado','Jogador','Ação','Notas','Jogo']];state.events.slice().reverse().forEach(e=>rows.push([e.time,e.gameTime,e.period,e.home,e.away,e.score,e.player,e.action,e.notes,e.game]));const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ad-pasteis-estatisticas.csv';a.click();URL.revokeObjectURL(a.href)}
function escapeHTML(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
load();
</script>
</body>
</html>
